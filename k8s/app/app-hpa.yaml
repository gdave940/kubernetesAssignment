apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nagp-app-hpa
  labels:
    tier: application
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nagp-app
  minReplicas: 4
  maxReplicas: 8

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50